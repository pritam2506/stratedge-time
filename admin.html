<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stratedge | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-blue': '#4169E1', // Royal Blue
                        'brand-orange': '#FFA500', // Orange
                        'brand-orange-hover': '#e69500',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-brand-blue text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-brand-orange" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                    <path d="M2 17l10 5 10-5"></path>
                    <path d="M2 12l10 5 10-5"></path>
                </svg>
                <h1 class="text-2xl font-bold tracking-wide">Stratedge</h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-sm font-medium bg-white/20 px-3 py-1 rounded-full">
                    Admin Portal
                </div>
                <button onclick="window.location.href='index.html'" class="text-sm font-medium hover:text-brand-orange transition-colors flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    Logout
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        
        <div class="mb-8 border-b pb-4">
            <h2 class="text-3xl font-bold text-gray-900">Employee Management</h2>
            <p class="text-gray-600 mt-1">Add new employees to the database so they can access the timesheet portal.</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Add User Form -->
            <div class="lg:col-span-1 bg-white p-6 rounded-xl shadow-sm border border-gray-200 h-fit sticky top-8">
                <h3 class="text-xl font-semibold mb-4 text-brand-blue flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
                    Add New User
                </h3>
                <form id="addUserForm" class="space-y-4">
                    <div>
                        <label for="empId" class="block text-sm font-medium text-gray-700 mb-1">Employee ID</label>
                        <input type="text" id="empId" required placeholder="e.g. SE-1001" 
                            class="w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:bg-white focus:ring-2 focus:ring-brand-blue focus:border-brand-blue outline-none transition-all">
                    </div>
                    <div>
                        <label for="userName" class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                        <input type="text" id="userName" required placeholder="John Doe" 
                            class="w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:bg-white focus:ring-2 focus:ring-brand-blue focus:border-brand-blue outline-none transition-all">
                    </div>
                    <div>
                        <label for="userEmail" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                        <input type="email" id="userEmail" required placeholder="john.doe@stratedge.com" 
                            class="w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:bg-white focus:ring-2 focus:ring-brand-blue focus:border-brand-blue outline-none transition-all">
                    </div>
                    
                    <button type="submit" id="submitBtn" 
                        class="w-full bg-brand-orange hover:bg-brand-orange-hover text-white font-semibold py-2.5 px-4 rounded-lg shadow-sm transition-colors flex justify-center items-center mt-6">
                        <span>Add Employee</span>
                    </button>
                </form>
            </div>

            <!-- Users List -->
            <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-semibold text-brand-blue flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                        Current Employees
                    </h3>
                    <span id="userCount" class="bg-blue-100 text-brand-blue text-xs font-bold px-3 py-1.5 rounded-full">0 Employees</span>
                </div>
                
                <div class="overflow-hidden border border-gray-200 rounded-lg">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Emp ID</th>
                                <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
                                <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider hidden sm:table-cell">Email</th>
                                <th scope="col" class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Action</th>
                            </tr>
                        </thead>
                        <tbody id="usersList" class="bg-white divide-y divide-gray-200">
                            <!-- Users will be populated here -->
                            <tr>
                                <td colspan="4" class="px-4 py-12 text-center text-sm text-gray-500">
                                    <div class="flex flex-col items-center justify-center space-y-3">
                                        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-brand-blue"></div>
                                        <span>Connecting to database...</span>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Notification System -->
    <div id="toast" class="fixed bottom-4 right-4 transform translate-y-full opacity-0 transition-all duration-300 z-50 flex items-center p-4 mb-4 text-gray-500 bg-white rounded-lg shadow-lg border border-gray-200" role="alert">
        <div id="toastIcon" class="inline-flex items-center justify-center flex-shrink-0 w-8 h-8 rounded-lg"></div>
        <div id="toastMessage" class="ml-3 text-sm font-normal">Message here.</div>
        <button type="button" onclick="hideToast()" class="ml-auto -mx-1.5 -my-1.5 bg-white text-gray-400 hover:text-gray-900 rounded-lg focus:ring-2 focus:ring-gray-300 p-1.5 hover:bg-gray-100 inline-flex h-8 w-8" aria-label="Close">
            <span class="sr-only">Close</span>
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path></svg>
        </button>
    </div>

    <!-- Firebase Implementation -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // ⚠️ PASTE YOUR FIREBASE CONFIGURATION HERE ⚠️
        // ==========================================
        const firebaseConfig = {
        apiKey: "AIzaSyAfcs4sC9tmPeHyFqeZEdz-SvbZNhdB06M",
        authDomain: "stratedge-time.firebaseapp.com",
        projectId: "stratedge-time",
        storageBucket: "stratedge-time.firebasestorage.app",
        messagingSenderId: "550779977682",
        appId: "1:550779977682:web:d4b4983b62876655b3d20b"
      };
        const appId = 'stratedge-time-recorder';
        // ==========================================

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let unsubscribeSnapshot = null;

        // UI Utility Functions
        window.hideToast = () => {
            const toast = document.getElementById('toast');
            toast.classList.add('translate-y-full', 'opacity-0');
        };

        const showToast = (message, type = 'success') => {
            const toast = document.getElementById('toast');
            const msgEl = document.getElementById('toastMessage');
            const iconEl = document.getElementById('toastIcon');
            
            msgEl.textContent = message;
            
            if (type === 'success') {
                iconEl.innerHTML = `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path></svg>`;
                iconEl.className = 'inline-flex items-center justify-center flex-shrink-0 w-8 h-8 text-green-500 bg-green-100 rounded-lg';
            } else {
                iconEl.innerHTML = `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path></svg>`;
                iconEl.className = 'inline-flex items-center justify-center flex-shrink-0 w-8 h-8 text-red-500 bg-red-100 rounded-lg';
            }

            toast.classList.remove('translate-y-full', 'opacity-0');
            setTimeout(window.hideToast, 4000);
        };

        // Make delete globally available for inline onclick
        window.deleteUser = async (docId) => {
            if (!currentUser) return;
            
            // Simple visual confirmation before deleting
            const btn = document.getElementById(`del-btn-${docId}`);
            if (btn.innerText === "Delete") {
                btn.innerText = "Sure?";
                btn.classList.add('bg-red-600', 'text-white', 'px-2', 'py-1', 'rounded');
                btn.classList.remove('text-red-500', 'hover:text-red-700');
                
                // Reset button after 3 seconds if not clicked again
                setTimeout(() => {
                    if(btn && btn.innerText === "Sure?") { 
                        btn.innerText = "Delete"; 
                        btn.classList.remove('bg-red-600', 'text-white', 'px-2', 'py-1', 'rounded');
                        btn.classList.add('text-red-500', 'hover:text-red-700');
                    }
                }, 3000);
                return;
            }

            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'employees', docId);
                await deleteDoc(docRef);
                showToast("Employee removed successfully");
            } catch (error) {
                showToast("Failed to remove employee: " + error.message, 'error');
            }
        };

        // Real-time listener for Employees
        const loadEmployees = () => {
            if (!currentUser) return;
            
            const tbody = document.getElementById('usersList');
            const countSpan = document.getElementById('userCount');
            
            // Reference to the exact same collection checked by the login page
            const employeesRef = collection(db, 'artifacts', appId, 'public', 'data', 'employees');
            
            // Listen for real-time updates
            unsubscribeSnapshot = onSnapshot(employeesRef, (snapshot) => {
                tbody.innerHTML = '';
                
                if (snapshot.empty) {
                    tbody.innerHTML = `<tr><td colspan="4" class="px-4 py-8 text-center text-sm text-gray-500">No employees added yet. Use the form to add one.</td></tr>`;
                    countSpan.textContent = "0 Employees";
                    return;
                }

                // Render each employee manually (No complex queries used, sorting in memory)
                const employees = [];
                snapshot.forEach(docSnap => {
                    employees.push({ id: docSnap.id, ...docSnap.data() });
                });
                
                // Sort locally by creation date (newest first)
                employees.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

                employees.forEach(emp => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-gray-50 transition-colors";
                    tr.innerHTML = `
                        <td class="px-4 py-3 whitespace-nowrap text-sm font-medium text-gray-900">${emp.empId}</td>
                        <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-700">${emp.name}</td>
                        <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-500 hidden sm:table-cell">${emp.email}</td>
                        <td class="px-4 py-3 whitespace-nowrap text-right text-sm font-medium">
                            <button id="del-btn-${emp.id}" onclick="deleteUser('${emp.id}')" class="text-red-500 hover:text-red-700 font-medium transition-colors">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
                
                countSpan.textContent = `${employees.length} Employee${employees.length !== 1 ? 's' : ''}`;
                
            }, (error) => {
                showToast("Database error: " + error.message, 'error');
                tbody.innerHTML = `<tr><td colspan="4" class="px-4 py-8 text-center text-sm text-red-500">Error loading data. Check your Firebase config.</td></tr>`;
            });
        };

        // Form Submit Handler (Add Employee)
        document.getElementById('addUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) {
                showToast("Still connecting to database. Please wait.", 'error');
                return;
            }

            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = `<svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Saving...`;
            btn.disabled = true;

            const name = document.getElementById('userName').value.trim();
            const email = document.getElementById('userEmail').value.trim();
            const empId = document.getElementById('empId').value.trim();

            try {
                const employeesRef = collection(db, 'artifacts', appId, 'public', 'data', 'employees');
                await addDoc(employeesRef, {
                    name,
                    email,
                    empId,
                    createdAt: Date.now()
                });
                
                showToast("Employee added successfully!");
                e.target.reset(); // Clear the form
            } catch (error) {
                showToast("Failed to add employee: " + error.message, 'error');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        // Initialize Authentication
        const initAuth = async () => {
            try {
                await signInAnonymously(auth);
            } catch (error) {
                document.getElementById('usersList').innerHTML = `<tr><td colspan="4" class="px-4 py-8 text-center text-sm text-red-500">Authentication failed. Check Firebase config.</td></tr>`;
                showToast("Auth Error: Could not connect to database.", 'error');
            }
        };

        // Listen for Auth State Changes
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                loadEmployees();
            } else {
                if (unsubscribeSnapshot) {
                    unsubscribeSnapshot();
                }
            }
        });

        // Start App
        initAuth();
    </script>
</body>
</html>
