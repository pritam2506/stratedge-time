<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stratedge | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-blue': '#4169E1', // Royal Blue
                        'brand-orange': '#FFA500', // Orange
                        'brand-orange-hover': '#e69500',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
        
        <!-- Header / Logo -->
        <div class="bg-brand-blue px-8 py-10 text-center">
            <div class="flex justify-center items-center gap-2 mb-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-brand-orange" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                    <path d="M2 17l10 5 10-5"></path>
                    <path d="M2 12l10 5 10-5"></path>
                </svg>
                <h1 class="text-3xl font-bold tracking-wide text-white">Stratedge</h1>
            </div>
            <p class="text-blue-100 text-sm mt-2">Time Management Portal</p>
        </div>

        <div class="p-8">
            <!-- Tabs -->
            <div class="flex border-b border-gray-200 mb-6">
                <button id="tab-admin" class="flex-1 pb-3 text-center font-semibold border-b-2 border-brand-blue text-brand-blue transition-colors">
                    Admin
                </button>
                <button id="tab-employee" class="flex-1 pb-3 text-center font-semibold border-b-2 border-transparent text-gray-400 hover:text-gray-600 transition-colors">
                    Employee
                </button>
            </div>

            <!-- Admin Login Form -->
            <form id="adminForm" class="space-y-5">
                <div>
                    <label for="adminId" class="block text-sm font-medium text-gray-700 mb-1">Admin ID</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                        </div>
                        <input type="text" id="adminId" required placeholder="e.g. SE-1001" 
                            class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-orange focus:border-brand-orange outline-none transition-colors">
                    </div>
                </div>
                <div>
                    <label for="adminPass" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                        <input type="password" id="adminPass" required placeholder="••••••••" 
                            class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-orange focus:border-brand-orange outline-none transition-colors">
                    </div>
                </div>
                
                <button type="submit" id="adminSubmitBtn"
                    class="w-full bg-brand-orange hover:bg-brand-orange-hover text-white font-bold py-3 px-4 rounded-lg shadow-sm transition-colors mt-2 flex justify-center items-center">
                    <span>Login to Admin Dashboard</span>
                </button>
            </form>

            <!-- Employee Login Form (Hidden by default) -->
            <form id="employeeForm" class="space-y-5 hidden">
                <div>
                    <label for="empId" class="block text-sm font-medium text-gray-700 mb-1">Employee ID</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                            </svg>
                        </div>
                        <input type="text" id="empId" required placeholder="e.g. SE-1001" 
                            class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-blue focus:border-brand-blue outline-none transition-colors">
                    </div>
                </div>
                <div>
                    <label for="empPass" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                        <input type="password" id="empPass" required placeholder="••••••••" 
                            class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-blue focus:border-brand-blue outline-none transition-colors">
                    </div>
                </div>
                
                <button type="submit" id="empSubmitBtn"
                    class="w-full bg-brand-blue hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-sm transition-colors mt-2 flex justify-center items-center">
                    <span>Access Timesheet</span>
                </button>
            </form>
        </div>
    </div>

    <!-- Toast Notification System -->
    <div id="toast" class="fixed top-4 right-4 transform -translate-y-full opacity-0 transition-all duration-300 z-50 flex items-center p-4 mb-4 text-gray-500 bg-white rounded-lg shadow-lg border border-gray-200" role="alert">
        <div id="toastIcon" class="inline-flex items-center justify-center flex-shrink-0 w-8 h-8 rounded-lg">
            <!-- Icon injected via JS -->
        </div>
        <div id="toastMessage" class="ml-3 text-sm font-normal">Message here.</div>
        <button type="button" onclick="hideToast()" class="ml-auto -mx-1.5 -my-1.5 bg-white text-gray-400 hover:text-gray-900 rounded-lg focus:ring-2 focus:ring-gray-300 p-1.5 hover:bg-gray-100 inline-flex h-8 w-8" aria-label="Close">
            <span class="sr-only">Close</span>
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path></svg>
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // ⚠️ PASTE YOUR REAL FIREBASE CONFIG HERE ⚠️
        // ==========================================
       const firebaseConfig = {
  apiKey: "AIzaSyAfcs4sC9tmPeHyFqeZEdz-SvbZNhdB06M",
  authDomain: "stratedge-time.firebaseapp.com",
  projectId: "stratedge-time",
  storageBucket: "stratedge-time.firebasestorage.app",
  messagingSenderId: "550779977682",
  appId: "1:550779977682:web:d4b4983b62876655b3d20b"
};
        const appId = 'stratedge-time-recorder';
        // ==========================================

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;

        // Tab elements
        const tabAdmin = document.getElementById('tab-admin');
        const tabEmployee = document.getElementById('tab-employee');
        const adminForm = document.getElementById('adminForm');
        const employeeForm = document.getElementById('employeeForm');

        // Toast utility functions
        window.hideToast = () => {
            const toast = document.getElementById('toast');
            toast.classList.add('-translate-y-full', 'opacity-0');
        };

        const showToast = (message, type = 'error') => {
            const toast = document.getElementById('toast');
            const msgEl = document.getElementById('toastMessage');
            const iconEl = document.getElementById('toastIcon');
            
            msgEl.textContent = message;
            
            if (type === 'success') {
                iconEl.innerHTML = `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path></svg>`;
                iconEl.className = 'inline-flex items-center justify-center flex-shrink-0 w-8 h-8 text-green-500 bg-green-100 rounded-lg';
            } else if (type === 'info') {
                iconEl.innerHTML = `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"></path></svg>`;
                iconEl.className = 'inline-flex items-center justify-center flex-shrink-0 w-8 h-8 text-blue-500 bg-blue-100 rounded-lg';
            } else {
                iconEl.innerHTML = `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path></svg>`;
                iconEl.className = 'inline-flex items-center justify-center flex-shrink-0 w-8 h-8 text-red-500 bg-red-100 rounded-lg';
            }

            toast.classList.remove('-translate-y-full', 'opacity-0');
            
            // Auto hide
            setTimeout(window.hideToast, 4000);
        };

        // Tab Switching Logic
        tabAdmin.addEventListener('click', () => {
            // Activate Admin Tab
            tabAdmin.classList.add('border-brand-blue', 'text-brand-blue');
            tabAdmin.classList.remove('border-transparent', 'text-gray-400');
            
            // Deactivate Employee Tab
            tabEmployee.classList.add('border-transparent', 'text-gray-400');
            tabEmployee.classList.remove('border-brand-blue', 'text-brand-blue');
            
            // Show/Hide Forms
            adminForm.classList.remove('hidden');
            employeeForm.classList.add('hidden');
        });

        tabEmployee.addEventListener('click', () => {
            // Activate Employee Tab
            tabEmployee.classList.add('border-brand-blue', 'text-brand-blue');
            tabEmployee.classList.remove('border-transparent', 'text-gray-400');
            
            // Deactivate Admin Tab
            tabAdmin.classList.add('border-transparent', 'text-gray-400');
            tabAdmin.classList.remove('border-brand-blue', 'text-brand-blue');
            
            // Show/Hide Forms
            employeeForm.classList.remove('hidden');
            adminForm.classList.add('hidden');
        });

        // Backend Auth Logic
        const processLogin = async (inputId, passId, btnId, targetPortal) => {
            const id = document.getElementById(inputId).value.trim();
            const pass = document.getElementById(passId).value;

            // Enforce "test" password rule
            if (pass !== 'test') {
                showToast('Invalid password. Hint: use "test"', 'error');
                return;
            }

            if (!currentUser) {
                showToast('Connecting to database... please wait.', 'info');
                return;
            }

            const btn = document.getElementById(btnId);
            const originalText = btn.innerHTML;
            btn.innerHTML = `<svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> <span>Authenticating...</span>`;
            btn.disabled = true;

            try {
                // Fetch user from database
                const employeesRef = collection(db, 'artifacts', appId, 'public', 'data', 'employees');
                const snapshot = await getDocs(employeesRef);
                
                let foundEmployee = null;
                snapshot.forEach(docSnap => {
                    if (docSnap.data().empId === id) {
                        foundEmployee = { id: docSnap.id, ...docSnap.data() };
                    }
                });

                if (foundEmployee) {
                    // Route logic based on target portal
                    if (targetPortal === 'admin') {
                        if (foundEmployee.role === 'Admin') {
                            showToast('Login successful! Redirecting...', 'success');
                            sessionStorage.setItem('stratedge_active_user', JSON.stringify(foundEmployee));
                            setTimeout(() => window.location.href = 'admin.html', 1000);
                        } else {
                            showToast('Access Denied: This ID does not have Administrator privileges.', 'error');
                        }
                    } else if (targetPortal === 'employee') {
                        // Admins AND Employees can log into the employee portal
                        showToast(`Welcome back, ${foundEmployee.name}! Redirecting...`, 'success');
                        sessionStorage.setItem('stratedge_active_user', JSON.stringify(foundEmployee));
                        setTimeout(() => window.location.href = 'timesheet.html', 1000);
                    }
                } else {
                    showToast('ID not found. Check with your administrator.', 'error');
                }
            } catch (error) {
                console.error(error);
                showToast('Database error: Check your connection.', 'error');
            } finally {
                if (btn) {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            }
        };

        // Form Submit Handlers
        adminForm.addEventListener('submit', (e) => {
            e.preventDefault();
            processLogin('adminId', 'adminPass', 'adminSubmitBtn', 'admin');
        });

        employeeForm.addEventListener('submit', (e) => {
            e.preventDefault();
            processLogin('empId', 'empPass', 'empSubmitBtn', 'employee');
        });

        // Initialize Firebase Anonymous Auth (Required to read Firestore)
        const initAuth = async () => {
            try {
                await signInAnonymously(auth);
            } catch (error) {
                console.error("Auth error", error);
            }
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
        });

        initAuth();
    </script>
</body>
</html>
