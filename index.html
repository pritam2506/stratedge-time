<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stratedge | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-blue': '#4169E1', // Royal Blue
                        'brand-orange': '#FFA500', // Orange
                        'brand-orange-hover': '#e69500',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
        
        <!-- Header / Logo -->
        <div class="bg-brand-blue px-8 py-10 text-center">
            <div class="flex justify-center items-center gap-2 mb-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-brand-orange" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                    <path d="M2 17l10 5 10-5"></path>
                    <path d="M2 12l10 5 10-5"></path>
                </svg>
                <h1 class="text-3xl font-bold tracking-wide text-white">Stratedge</h1>
            </div>
            <p class="text-blue-100 text-sm mt-2">Time Management Portal</p>
        </div>

        <div class="p-8">
            <!-- Tabs -->
            <div class="flex border-b border-gray-200 mb-6">
                <button id="tab-admin" class="flex-1 pb-3 text-center font-semibold border-b-2 border-brand-blue text-brand-blue transition-colors">
                    Admin
                </button>
                <button id="tab-employee" class="flex-1 pb-3 text-center font-semibold border-b-2 border-transparent text-gray-400 hover:text-gray-600 transition-colors">
                    Employee
                </button>
            </div>

            <!-- Admin Login Form -->
            <form id="adminForm" class="space-y-5">
                <div>
                    <label for="adminUser" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                        </div>
                        <input type="text" id="adminUser" required placeholder="Enter admin username" 
                            class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-blue focus:border-brand-blue outline-none transition-colors">
                    </div>
                </div>
                <div>
                    <label for="adminPass" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                        <input type="password" id="adminPass" required placeholder="••••••••" 
                            class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-blue focus:border-brand-blue outline-none transition-colors">
                    </div>
                </div>
                
                <button type="submit" 
                    class="w-full bg-brand-orange hover:bg-brand-orange-hover text-white font-bold py-3 px-4 rounded-lg shadow-sm transition-colors mt-2">
                    Login to Admin Dashboard
                </button>
            </form>

            <!-- Employee Login Form (Hidden by default) -->
            <form id="employeeForm" class="space-y-5 hidden">
                
                <!-- STEP 1: Employee ID Input -->
                <div id="otpStep1">
                    <div>
                        <label for="empId" class="block text-sm font-medium text-gray-700 mb-1">Employee ID</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                                </svg>
                            </div>
                            <input type="text" id="empId" placeholder="e.g. SE-1001" 
                                class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-blue focus:border-brand-blue outline-none transition-colors">
                        </div>
                    </div>
                    
                    <button type="button" id="getOtpBtn"
                        class="w-full bg-brand-blue hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-sm transition-colors mt-6 flex justify-center items-center">
                        <span>Send Login Link</span>
                    </button>
                </div>

                <!-- STEP 2: Magic Link Sent (Replaces OTP Input) -->
                <div id="magicLinkStep2" class="hidden text-center py-4">
                    <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-green-100 mb-4">
                        <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    </div>
                    <h3 class="text-xl font-bold text-gray-900 mb-2">Check your inbox</h3>
                    <p class="text-sm text-gray-600 mb-6" id="magicLinkMessage">We've sent a magic link to your registered email.</p>
                    
                    <div class="bg-blue-50 border border-blue-200 p-4 rounded-lg text-left">
                        <p class="text-sm text-blue-800 font-medium mb-1">Instructions:</p>
                        <p class="text-xs text-blue-700 leading-relaxed">
                            Please check your email inbox for a link to login. Click on that secure link to automatically access your timesheet portal. You can now close this window.
                        </p>
                    </div>

                    <button type="button" id="backToIdBtn" class="mt-6 text-xs font-semibold text-gray-500 hover:text-brand-blue transition-colors">
                        &larr; Use a different Employee ID
                    </button>
                </div>

            </form>
        </div>
    </div>

    <!-- Toast Notification System -->
    <div id="toast" class="fixed top-4 right-4 transform -translate-y-full opacity-0 transition-all duration-300 z-50 flex items-center p-4 mb-4 text-gray-500 bg-white rounded-lg shadow-lg border border-gray-200 max-w-sm" role="alert">
        <div id="toastIcon" class="inline-flex items-center justify-center flex-shrink-0 w-8 h-8 rounded-lg"></div>
        <div id="toastMessage" class="ml-3 text-sm font-normal">Message here.</div>
        <button type="button" onclick="hideToast()" class="ml-auto -mx-1.5 -my-1.5 bg-white text-gray-400 hover:text-gray-900 rounded-lg focus:ring-2 focus:ring-gray-300 p-1.5 hover:bg-gray-100 inline-flex h-8 w-8" aria-label="Close">
            <span class="sr-only">Close</span>
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path></svg>
        </button>
    </div>

    <!-- UI Logic & Firebase Backend Integration -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, sendSignInLinkToEmail, isSignInWithEmailLink, signInWithEmailLink } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // ⚠️ PASTE YOUR FIREBASE CONFIGURATION HERE ⚠️
        // ==========================================
        const firebaseConfig = {
  apiKey: "AIzaSyAfcs4sC9tmPeHyFqeZEdz-SvbZNhdB06M",
  authDomain: "stratedge-time.firebaseapp.com",
  projectId: "stratedge-time",
  storageBucket: "stratedge-time.firebasestorage.app",
  messagingSenderId: "550779977682",
  appId: "1:550779977682:web:d4b4983b62876655b3d20b"
};
        const appId = 'stratedge-time-recorder';
        // ==========================================

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;

        // Toast utility functions
        let toastTimeout;
        window.hideToast = () => {
            const toast = document.getElementById('toast');
            toast.classList.add('-translate-y-full', 'opacity-0');
            clearTimeout(toastTimeout);
        };

        const showToast = (message, type = 'error', duration = 4000) => {
            const toast = document.getElementById('toast');
            const msgEl = document.getElementById('toastMessage');
            const iconEl = document.getElementById('toastIcon');
            
            msgEl.textContent = message;
            
            if (type === 'success') {
                iconEl.innerHTML = `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path></svg>`;
                iconEl.className = 'inline-flex items-center justify-center flex-shrink-0 w-8 h-8 text-green-500 bg-green-100 rounded-lg';
            } else if (type === 'info') {
                iconEl.innerHTML = `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"></path></svg>`;
                iconEl.className = 'inline-flex items-center justify-center flex-shrink-0 w-8 h-8 text-blue-500 bg-blue-100 rounded-lg';
            } else {
                iconEl.innerHTML = `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path></svg>`;
                iconEl.className = 'inline-flex items-center justify-center flex-shrink-0 w-8 h-8 text-red-500 bg-red-100 rounded-lg';
            }

            toast.classList.remove('-translate-y-full', 'opacity-0');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(window.hideToast, duration);
        };

        // UI Tabs Logic
        const tabAdmin = document.getElementById('tab-admin');
        const tabEmployee = document.getElementById('tab-employee');
        const adminForm = document.getElementById('adminForm');
        const employeeForm = document.getElementById('employeeForm');

        tabAdmin.addEventListener('click', () => {
            tabAdmin.classList.add('border-brand-blue', 'text-brand-blue');
            tabAdmin.classList.remove('border-transparent', 'text-gray-400');
            tabEmployee.classList.add('border-transparent', 'text-gray-400');
            tabEmployee.classList.remove('border-brand-blue', 'text-brand-blue');
            adminForm.classList.remove('hidden');
            employeeForm.classList.add('hidden');
        });

        tabEmployee.addEventListener('click', () => {
            tabEmployee.classList.add('border-brand-blue', 'text-brand-blue');
            tabEmployee.classList.remove('border-transparent', 'text-gray-400');
            tabAdmin.classList.add('border-transparent', 'text-gray-400');
            tabAdmin.classList.remove('border-brand-blue', 'text-brand-blue');
            employeeForm.classList.remove('hidden');
            adminForm.classList.add('hidden');
        });

        // Form Submit: ADMIN
        adminForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;

            if (user === 'admin' && pass === 'admin') {
                showToast('Login successful! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 1000);
            } else {
                showToast('Invalid credentials. Hint: use admin/admin', 'error');
            }
        });

        // --- MAGIC LINK LOGIC ---
        let pendingUser = null;

        // Step 1: Request Magic Link
        document.getElementById('getOtpBtn').addEventListener('click', async () => {
            if (!currentUser && !isSignInWithEmailLink(auth, window.location.href)) {
                showToast('Still connecting to the database. Please wait.', 'info');
                return;
            }

            const empIdInput = document.getElementById('empId').value.trim();
            if (!empIdInput) {
                showToast('Please enter your Employee ID first.', 'error');
                return;
            }

            const btn = document.getElementById('getOtpBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = `<svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> <span>Sending Email...</span>`;
            btn.disabled = true;

            try {
                const employeesRef = collection(db, 'artifacts', appId, 'public', 'data', 'employees');
                const snapshot = await getDocs(employeesRef);
                
                let foundEmployee = null;
                snapshot.forEach(docSnap => {
                    if (docSnap.data().empId === empIdInput) {
                        foundEmployee = { id: docSnap.id, ...docSnap.data() };
                    }
                });

                if (foundEmployee) {
                    if (!foundEmployee.email) {
                        showToast('No email is registered for this Employee ID. Please contact your Admin.', 'error', 6000);
                        btn.innerHTML = originalText;
                        btn.disabled = false;
                        return;
                    }

                    // Configuration for the Magic Link
                    const actionCodeSettings = {
                        url: window.location.href.split('?')[0], // Redirects back to this exact page
                        handleCodeInApp: true,
                    };

                    // Send the email via Firebase
                    await sendSignInLinkToEmail(auth, foundEmployee.email, actionCodeSettings);
                    
                    // Save email locally so we don't have to ask for it when they click the link
                    window.localStorage.setItem('emailForSignIn', foundEmployee.email);
                    window.localStorage.setItem('pendingEmpData', JSON.stringify(foundEmployee));
                    
                    // Mask the email for display securely
                    const emailParts = foundEmployee.email.split('@');
                    let maskedEmail = foundEmployee.email;
                    if (emailParts.length === 2) {
                        const namePart = emailParts[0];
                        const domainPart = emailParts[1];
                        const maskedName = namePart.length > 2 
                            ? namePart[0] + '*'.repeat(namePart.length - 2) + namePart[namePart.length - 1] 
                            : namePart[0] + '*';
                        maskedEmail = `${maskedName}@${domainPart}`;
                    }
                    
                    document.getElementById('magicLinkMessage').innerHTML = `Login link sent securely to <br><span class="font-bold text-brand-blue">${maskedEmail}</span>`;
                    
                    // Switch UI steps
                    document.getElementById('otpStep1').classList.add('hidden');
                    document.getElementById('magicLinkStep2').classList.remove('hidden');

                } else {
                    showToast('Employee ID not found. Check with your administrator.', 'error');
                }
                
            } catch (error) {
                console.error(error);
                showToast('Failed to send login link. Error: ' + error.message, 'error');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        // Go Back to Step 1
        document.getElementById('backToIdBtn').addEventListener('click', () => {
            document.getElementById('magicLinkStep2').classList.add('hidden');
            document.getElementById('otpStep1').classList.remove('hidden');
        });

        // --- HANDLE INCOMING MAGIC LINK ---
        const handleIncomingMagicLink = async () => {
            // Check if the current URL contains a Firebase magic link code
            if (isSignInWithEmailLink(auth, window.location.href)) {
                
                // Show a loading state over the page
                document.body.insertAdjacentHTML('beforeend', `
                    <div id="magicLinkLoader" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center">
                        <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-brand-blue mb-4"></div>
                        <h2 class="text-xl font-bold text-gray-800">Authenticating...</h2>
                        <p class="text-gray-500 text-sm mt-2">Securely logging you into your timesheet.</p>
                    </div>
                `);

                let email = window.localStorage.getItem('emailForSignIn');
                
                // If opened on a different device/browser, ask for email to confirm
                if (!email) {
                    email = window.prompt('For security, please confirm your email address to log in:');
                }

                if (email) {
                    try {
                        await signInWithEmailLink(auth, email, window.location.href);
                        window.localStorage.removeItem('emailForSignIn');
                        
                        // Retrieve the stored user info
                        let activeUser = JSON.parse(window.localStorage.getItem('pendingEmpData'));
                        
                        // Fallback if data was cleared or cross-device
                        if (!activeUser) {
                            const employeesRef = collection(db, 'artifacts', appId, 'public', 'data', 'employees');
                            const snapshot = await getDocs(employeesRef);
                            snapshot.forEach(docSnap => {
                                if (docSnap.data().email === email) {
                                    activeUser = { id: docSnap.id, ...docSnap.data() };
                                }
                            });
                        }

                        if (activeUser) {
                            sessionStorage.setItem('stratedge_active_user', JSON.stringify(activeUser));
                            window.location.href = 'timesheet.html';
                        } else {
                            showToast("Could not find employee profile for this email.", "error");
                            document.getElementById('magicLinkLoader').remove();
                        }
                    } catch (error) {
                        console.error("Magic Link Error", error);
                        showToast("Link expired or invalid. Please request a new one.", "error", 6000);
                        document.getElementById('magicLinkLoader').remove();
                    }
                } else {
                    document.getElementById('magicLinkLoader').remove();
                }
            } else {
                // Not a magic link, load normal auth (Anonymous) for looking up users
                initAuth();
            }
        };

        // Start Firebase Auth (Required for Firestore access)
        const initAuth = async () => {
            try {
                await signInAnonymously(auth);
            } catch (error) {
                showToast("Auth Error: Could not connect to database.", 'error');
                console.error("Auth error", error);
            }
        };

        // Listen for connection
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
        });

        // Run the Magic Link check immediately on page load
        handleIncomingMagicLink();
    </script>
</body>
</html>
