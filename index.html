<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stratedge | Portal Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-blue': '#4169E1',
                        'brand-orange': '#FFA500',
                        'brand-orange-hover': '#e69500',
                    }
                }
            }
        }
    </script>
    <style>
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-brand-blue to-blue-800 min-h-screen flex items-center justify-center p-4">

    <!-- Login Container -->
    <div class="max-w-md w-full glass-effect rounded-2xl shadow-2xl overflow-hidden">
        <!-- Branding Header -->
        <div class="bg-white p-8 text-center border-b border-gray-100">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-brand-orange/10 rounded-2xl mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-brand-orange" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                    <path d="M2 17l10 5 10-5"></path>
                    <path d="M2 12l10 5 10-5"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-black text-brand-blue tracking-tight">Stratedge</h1>
            <p class="text-gray-500 text-sm mt-1 font-medium">Enterprise Resource Portal</p>
        </div>

        <!-- Form Section -->
        <div class="p-8">
            <form id="loginForm" class="space-y-6">
                <div>
                    <label for="empId" class="block text-xs font-bold text-gray-700 uppercase tracking-widest mb-2 ml-1">Employee ID</label>
                    <input type="text" id="empId" required placeholder="e.g. SE-1001" 
                        class="w-full px-4 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-brand-blue focus:ring-0 outline-none transition-all font-semibold text-gray-800">
                </div>

                <!-- NEW PASSWORD FIELD -->
                <div id="passwordContainer">
                    <label for="empPassword" class="block text-xs font-bold text-gray-700 uppercase tracking-widest mb-2 ml-1">Password</label>
                    <input type="password" id="empPassword" required placeholder="DDMMYY" 
                        class="w-full px-4 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-brand-blue focus:ring-0 outline-none transition-all font-semibold text-gray-800 tracking-widest">
                    <p class="text-[10px] text-gray-400 mt-1 ml-1 font-medium">Use your Date of Joining (e.g. 150823 for 15 Aug 2023)</p>
                </div>

                <div id="errorMessage" class="hidden text-red-500 text-xs font-bold bg-red-50 p-3 rounded-lg border border-red-100 flex items-center gap-2">
                    <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"></path></svg>
                    <span id="errorText">Invalid Employee ID. Please try again.</span>
                </div>

                <button type="submit" id="loginBtn" class="w-full bg-brand-orange hover:bg-brand-orange-hover text-white font-black py-4 rounded-xl shadow-lg transition-all transform hover:-translate-y-0.5 active:scale-95 flex items-center justify-center gap-2">
                    <span>SECURE LOGIN</span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </button>
            </form>
        </div>

        <div class="bg-gray-50 px-8 py-4 border-t border-gray-100 relative">
            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-tighter text-center">© 2025 Stratedge Communications Pvt Ltd</p>
            <a href="Client Catalog.html" title="View Client Catalog" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-300 hover:text-brand-orange transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
            </a>
        </div>
    </div>

    <!-- Admin Choice Modal -->
    <div id="adminChoiceModal" class="fixed inset-0 bg-brand-blue/90 backdrop-blur-sm z-[100] hidden items-center justify-center p-4">
        <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-8 transform scale-95 transition-transform duration-300" id="modalCard">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-50 rounded-full mb-4">
                    <svg class="w-8 h-8 text-brand-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <h2 class="text-2xl font-black text-gray-900">Welcome, Administrator</h2>
                <p class="text-gray-500 mt-2 font-medium">Where would you like to proceed?</p>
            </div>

            <div class="grid gap-4">
                <button onclick="navigate('admin.html')" class="group p-5 border-2 border-brand-blue hover:bg-brand-blue transition-all rounded-2xl flex items-center gap-4 text-left">
                    <div class="w-12 h-12 bg-blue-50 group-hover:bg-white/20 rounded-xl flex items-center justify-center transition-colors">
                        <svg class="w-6 h-6 text-brand-blue group-hover:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    </div>
                    <div>
                        <div class="font-black text-brand-blue group-hover:text-white text-lg leading-tight uppercase tracking-tight">Admin Dashboard</div>
                        <div class="text-gray-400 group-hover:text-white/60 text-xs font-medium">Manage users & approvals</div>
                    </div>
                </button>

                <button onclick="navigate('timesheet.html')" class="group p-5 border-2 border-brand-orange hover:bg-brand-orange transition-all rounded-2xl flex items-center gap-4 text-left">
                    <div class="w-12 h-12 bg-orange-50 group-hover:bg-white/20 rounded-xl flex items-center justify-center transition-colors">
                        <svg class="w-6 h-6 text-brand-orange group-hover:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <div>
                        <div class="font-black text-brand-orange group-hover:text-white text-lg leading-tight uppercase tracking-tight">Personal Timesheet</div>
                        <div class="text-gray-400 group-hover:text-white/60 text-xs font-medium">Log your weekly work hours</div>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase Implementation -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, where, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAfcs4sC9tmPeHyFqeZEdz-SvbZNhdB06M",
            authDomain: "stratedge-time.firebaseapp.com",
            projectId: "stratedge-time",
            storageBucket: "stratedge-time.firebasestorage.app",
            messagingSenderId: "550779977682",
            appId: "1:550779977682:web:d4b4983b62876655b3d20b"
        };
        const appId = 'stratedge-time-recorder';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let fbUser = null;

        const empIdInput = document.getElementById('empId');
        const pwdContainer = document.getElementById('passwordContainer');
        const pwdInput = document.getElementById('empPassword');
        const errorMsg = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');

        // Dynamically hide/show password field based on Admin ID prefix
        empIdInput.addEventListener('input', (e) => {
            const val = e.target.value.trim().toUpperCase();
            if (val.startsWith('AD')) {
                pwdContainer.classList.add('hidden');
                pwdInput.required = false;
                pwdInput.value = '';
            } else {
                pwdContainer.classList.remove('hidden');
                pwdInput.required = true;
            }
        });

        // Login Logic
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const empId = empIdInput.value.trim();
            const btn = document.getElementById('loginBtn');

            btn.disabled = true;
            btn.innerHTML = `<svg class="animate-spin h-5 w-5 mr-3 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> VERIFYING...`;
            errorMsg.classList.add('hidden');

            try {
                // Fetch employee by ID
                const empsRef = collection(db, 'artifacts', appId, 'public', 'data', 'employees');
                const q = query(empsRef, where("empId", "==", empId));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    throw new Error("User not found. Please verify your Employee ID.");
                }

                const userData = querySnapshot.docs[0].data();
                const docId = querySnapshot.docs[0].id;
                
                // Check Active Status
                if (userData.status === 'Inactive') {
                    throw new Error("Account is inactive. Please contact the administrator.");
                }

                // Password Validation for Employees
                if (userData.role !== 'Admin') {
                    const doj = userData.doj;
                    if (!doj) throw new Error("Account incomplete: No Date of Joining found.");
                    
                    const parts = doj.split('-'); // Format is YYYY-MM-DD
                    if (parts.length !== 3) throw new Error("Account incomplete: Invalid DOJ format.");
                    
                    const expectedPwd = `${parts[2]}${parts[1]}${parts[0].slice(-2)}`;
                    const enteredPwd = pwdInput.value.trim();

                    if (enteredPwd !== expectedPwd) {
                        throw new Error("Invalid password. Use your DOJ in DDMMYY format.");
                    }
                }

                // Store in session
                sessionStorage.setItem('stratedge_active_user', JSON.stringify({ ...userData, id: docId }));

                if (userData.role === 'Admin') {
                    // Show Admin Choice Modal
                    document.getElementById('adminChoiceModal').classList.replace('hidden', 'flex');
                    setTimeout(() => {
                        document.getElementById('modalCard').classList.replace('scale-95', 'scale-100');
                    }, 50);
                } else {
                    // Direct redirect for employees
                    window.location.href = 'timesheet.html';
                }
            } catch (err) {
                console.error(err);
                errorText.textContent = err.message || "An error occurred during login.";
                errorMsg.classList.remove('hidden');
                btn.disabled = false;
                btn.innerHTML = `<span>SECURE LOGIN</span> <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>`;
            }
        });

        // Navigation Helper
        window.navigate = (page) => {
            window.location.href = page;
        };

        // Init Auth
        signInAnonymously(auth).catch(e => console.error("Firebase Auth Fail", e));
    </script>
</body>
</html>
