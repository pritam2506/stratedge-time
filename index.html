<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stratedge | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-blue': '#4169E1', // Royal Blue
                        'brand-orange': '#FFA500', // Orange
                        'brand-orange-hover': '#e69500',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
        
        <!-- Header / Logo -->
        <div class="bg-brand-blue px-8 py-10 text-center">
            <div class="flex justify-center items-center gap-2 mb-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-brand-orange" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                    <path d="M2 17l10 5 10-5"></path>
                    <path d="M2 12l10 5 10-5"></path>
                </svg>
                <h1 class="text-3xl font-bold tracking-wide text-white">Stratedge</h1>
            </div>
            <p class="text-blue-100 text-sm mt-2">Time Management Portal</p>
        </div>

        <div class="p-8">
            <!-- Tabs -->
            <div class="flex border-b border-gray-200 mb-6">
                <button id="tab-admin" class="flex-1 pb-3 text-center font-semibold border-b-2 border-brand-blue text-brand-blue transition-colors">
                    Admin
                </button>
                <button id="tab-employee" class="flex-1 pb-3 text-center font-semibold border-b-2 border-transparent text-gray-400 hover:text-gray-600 transition-colors">
                    Employee
                </button>
            </div>

            <!-- ============================== -->
            <!-- ADMIN LOGIN FORM               -->
            <!-- ============================== -->
            <div id="adminForm" class="space-y-5">
                <!-- Primary: Email Magic Link -->
                <div id="adminStep1">
                    <div>
                        <label for="adminId" class="block text-sm font-medium text-gray-700 mb-1">Admin ID (Magic Link)</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                                </svg>
                            </div>
                            <input type="text" id="adminId" placeholder="e.g. SE-1001" 
                                class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-blue focus:border-brand-blue outline-none transition-colors">
                        </div>
                    </div>
                    
                    <button type="button" id="getAdminLinkBtn"
                        class="w-full bg-brand-orange hover:bg-brand-orange-hover text-white font-bold py-3 px-4 rounded-lg shadow-sm transition-colors mt-4 flex justify-center items-center">
                        <span>Send Admin Login Link</span>
                    </button>
                </div>

                <!-- Admin Magic Link Sent -->
                <div id="adminLinkStep2" class="hidden text-center py-4">
                    <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-orange-100 mb-4">
                        <svg class="w-8 h-8 text-brand-orange" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    </div>
                    <h3 class="text-xl font-bold text-gray-900 mb-2">Check your inbox</h3>
                    <p class="text-sm text-gray-600 mb-6" id="adminLinkMessage">We've sent an admin link to your email.</p>
                    <button type="button" id="backToAdminIdBtn" class="text-xs font-semibold text-gray-500 hover:text-brand-orange transition-colors">
                        &larr; Use a different Admin ID
                    </button>
                </div>

                <!-- Fallback Divider -->
                <div class="relative py-4">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-200"></div>
                    </div>
                    <div class="relative flex justify-center">
                        <span class="bg-white px-4 text-xs font-semibold text-gray-400 uppercase tracking-widest">Or Fallback Login</span>
                    </div>
                </div>

                <!-- Fallback Password Section -->
                <form id="adminFallbackForm" class="space-y-4">
                    <div>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <svg class="h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                            </div>
                            <input type="text" id="adminUser" required placeholder="Username (admin)" 
                                class="w-full pl-9 pr-4 py-2 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-orange outline-none transition-colors">
                        </div>
                    </div>
                    <div>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <svg class="h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                            </div>
                            <input type="password" id="adminPass" required placeholder="Password (admin)" 
                                class="w-full pl-9 pr-4 py-2 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-orange outline-none transition-colors">
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-2 px-4 rounded-lg shadow-sm transition-colors text-sm">
                        Fallback Login
                    </button>
                </form>
            </div>

            <!-- ============================== -->
            <!-- EMPLOYEE LOGIN FORM            -->
            <!-- ============================== -->
            <div id="employeeForm" class="space-y-5 hidden">
                
                <!-- Primary: Email Magic Link -->
                <div id="otpStep1">
                    <div>
                        <label for="empId" class="block text-sm font-medium text-gray-700 mb-1">Employee ID (Magic Link)</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                                </svg>
                            </div>
                            <input type="text" id="empId" placeholder="e.g. SE-1001" 
                                class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-blue focus:border-brand-blue outline-none transition-colors">
                        </div>
                    </div>
                    
                    <button type="button" id="getOtpBtn"
                        class="w-full bg-brand-blue hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-sm transition-colors mt-4 flex justify-center items-center">
                        <span>Send Login Link</span>
                    </button>
                </div>

                <!-- Employee Magic Link Sent -->
                <div id="magicLinkStep2" class="hidden text-center py-4">
                    <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-100 mb-4">
                        <svg class="w-8 h-8 text-brand-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    </div>
                    <h3 class="text-xl font-bold text-gray-900 mb-2">Check your inbox</h3>
                    <p class="text-sm text-gray-600 mb-6" id="magicLinkMessage">We've sent a magic link to your registered email.</p>
                    <button type="button" id="backToIdBtn" class="text-xs font-semibold text-gray-500 hover:text-brand-blue transition-colors">
                        &larr; Use a different Employee ID
                    </button>
                </div>

                <!-- Fallback Divider -->
                <div class="relative py-4">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-200"></div>
                    </div>
                    <div class="relative flex justify-center">
                        <span class="bg-white px-4 text-xs font-semibold text-gray-400 uppercase tracking-widest">Or Fallback Login</span>
                    </div>
                </div>

                <!-- Fallback Password Section -->
                <form id="employeeFallbackForm" class="space-y-4">
                    <div>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <svg class="h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                            </div>
                            <input type="text" id="empUser" required placeholder="Username (admin)" 
                                class="w-full pl-9 pr-4 py-2 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-blue outline-none transition-colors">
                        </div>
                    </div>
                    <div>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <svg class="h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                            </div>
                            <input type="password" id="empPass" required placeholder="Password (admin)" 
                                class="w-full pl-9 pr-4 py-2 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-blue outline-none transition-colors">
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-2 px-4 rounded-lg shadow-sm transition-colors text-sm">
                        Fallback Login
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast Notification System -->
    <div id="toast" class="fixed top-4 right-4 transform -translate-y-full opacity-0 transition-all duration-300 z-[110] flex items-center p-4 mb-4 text-gray-500 bg-white rounded-lg shadow-lg border border-gray-200 max-w-sm" role="alert">
        <div id="toastIcon" class="inline-flex items-center justify-center flex-shrink-0 w-8 h-8 rounded-lg"></div>
        <div id="toastMessage" class="ml-3 text-sm font-normal">Message here.</div>
        <button type="button" onclick="hideToast()" class="ml-auto -mx-1.5 -my-1.5 bg-white text-gray-400 hover:text-gray-900 rounded-lg focus:ring-2 focus:ring-gray-300 p-1.5 hover:bg-gray-100 inline-flex h-8 w-8" aria-label="Close">
            <span class="sr-only">Close</span>
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path></svg>
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, sendSignInLinkToEmail, isSignInWithEmailLink, signInWithEmailLink } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Setup
        const firebaseConfigStr = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
        let firebaseConfig;
        if (firebaseConfigStr) {
            firebaseConfig = JSON.parse(firebaseConfigStr);
        } else {
            const firebaseConfig = {
  apiKey: "AIzaSyAfcs4sC9tmPeHyFqeZEdz-SvbZNhdB06M",
  authDomain: "stratedge-time.firebaseapp.com",
  projectId: "stratedge-time",
  storageBucket: "stratedge-time.firebasestorage.app",
  messagingSenderId: "550779977682",
  appId: "1:550779977682:web:d4b4983b62876655b3d20b"
};
            };
        }
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'stratedge-time-recorder';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;

        // Tab elements
        const tabAdmin = document.getElementById('tab-admin');
        const tabEmployee = document.getElementById('tab-employee');
        const adminForm = document.getElementById('adminForm');
        const employeeForm = document.getElementById('employeeForm');

        // Toast utility functions
        window.hideToast = () => {
            const toast = document.getElementById('toast');
            toast.classList.add('-translate-y-full', 'opacity-0');
        };

        const showToast = (message, type = 'error') => {
            const toast = document.getElementById('toast');
            const msgEl = document.getElementById('toastMessage');
            const iconEl = document.getElementById('toastIcon');
            
            msgEl.textContent = message;
            
            if (type === 'success') {
                iconEl.innerHTML = `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path></svg>`;
                iconEl.className = 'inline-flex items-center justify-center flex-shrink-0 w-8 h-8 text-green-500 bg-green-100 rounded-lg';
            } else if (type === 'info') {
                iconEl.innerHTML = `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"></path></svg>`;
                iconEl.className = 'inline-flex items-center justify-center flex-shrink-0 w-8 h-8 text-blue-500 bg-blue-100 rounded-lg';
            } else {
                iconEl.innerHTML = `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path></svg>`;
                iconEl.className = 'inline-flex items-center justify-center flex-shrink-0 w-8 h-8 text-red-500 bg-red-100 rounded-lg';
            }

            toast.classList.remove('-translate-y-full', 'opacity-0');
            setTimeout(window.hideToast, 4000);
        };

        // Tab Switching Logic
        tabAdmin.addEventListener('click', () => {
            tabAdmin.classList.add('border-brand-blue', 'text-brand-blue');
            tabAdmin.classList.remove('border-transparent', 'text-gray-400');
            tabEmployee.classList.add('border-transparent', 'text-gray-400');
            tabEmployee.classList.remove('border-brand-blue', 'text-brand-blue');
            adminForm.classList.remove('hidden');
            employeeForm.classList.add('hidden');
        });

        tabEmployee.addEventListener('click', () => {
            tabEmployee.classList.add('border-brand-blue', 'text-brand-blue');
            tabEmployee.classList.remove('border-transparent', 'text-gray-400');
            tabAdmin.classList.add('border-transparent', 'text-gray-400');
            tabAdmin.classList.remove('border-brand-blue', 'text-brand-blue');
            employeeForm.classList.remove('hidden');
            adminForm.classList.add('hidden');
        });

        // --- FALLBACK LOGIN HANDLERS (admin/admin) ---
        document.getElementById('adminFallbackForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;

            if (user === 'admin' && pass === 'admin') {
                showToast('Fallback login successful! Redirecting...', 'success');
                setTimeout(() => window.location.href = 'admin.html', 1000);
            } else {
                showToast('Invalid fallback credentials. Hint: use admin/admin', 'error');
            }
        });

        document.getElementById('employeeFallbackForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('empUser').value;
            const pass = document.getElementById('empPass').value;

            if (user === 'admin' && pass === 'admin') {
                showToast('Fallback login successful! Redirecting...', 'success');
                // Mock user data for the employee timesheet page
                const demoUser = {
                    name: "Demo Employee",
                    email: "demo@stratedge.com",
                    empId: "DEMO-001",
                    role: "Employee",
                    designation: "Demo Account",
                    department: "Design",
                    doj: "2024-01-01"
                };
                sessionStorage.setItem('stratedge_active_user', JSON.stringify(demoUser));
                setTimeout(() => window.location.href = 'timesheet.html', 1000);
            } else {
                showToast('Invalid fallback credentials. Hint: use admin/admin', 'error');
            }
        });

        // --- MAGIC LINK AUTHENTICATION LOGIC ---
        const maskEmail = (email) => {
            const emailParts = email.split('@');
            if (emailParts.length === 2) {
                const namePart = emailParts[0];
                const domainPart = emailParts[1];
                const maskedName = namePart.length > 2 
                    ? namePart[0] + '*'.repeat(namePart.length - 2) + namePart[namePart.length - 1] 
                    : namePart[0] + '*';
                return `${maskedName}@${domainPart}`;
            }
            return email;
        };

        const processMagicLinkRequest = async (inputId, buttonId, targetType, messageElementId, step1Id, step2Id) => {
            if (!currentUser && !isSignInWithEmailLink(auth, window.location.href)) {
                showToast('Connecting to database... please try again.', 'info');
                return;
            }

            const empIdInput = document.getElementById(inputId).value.trim();
            if (!empIdInput) {
                showToast('Please enter an ID first.', 'error');
                return;
            }

            const btn = document.getElementById(buttonId);
            const originalText = btn.innerHTML;
            btn.innerHTML = `Sending Email...`;
            btn.disabled = true;

            let foundEmployee = null;

            try {
                const employeesRef = collection(db, 'artifacts', appId, 'public', 'data', 'employees');
                const snapshot = await getDocs(employeesRef);
                
                snapshot.forEach(docSnap => {
                    if (docSnap.data().empId === empIdInput) {
                        foundEmployee = { id: docSnap.id, ...docSnap.data() };
                    }
                });

                if (foundEmployee) {
                    if (targetType === 'admin' && foundEmployee.role !== 'Admin') {
                        showToast('Access Denied: This ID does not have Administrator privileges.', 'error');
                        btn.innerHTML = originalText;
                        btn.disabled = false;
                        return;
                    }

                    if (!foundEmployee.email) {
                        showToast('No email is registered for this ID. Please use fallback login.', 'error', 6000);
                        btn.innerHTML = originalText;
                        btn.disabled = false;
                        return;
                    }

                    const redirectUrl = window.location.href.split('?')[0] + `?target=${targetType}`;
                    const actionCodeSettings = { url: redirectUrl, handleCodeInApp: true };

                    await sendSignInLinkToEmail(auth, foundEmployee.email, actionCodeSettings);
                    
                    window.localStorage.setItem('emailForSignIn', foundEmployee.email);
                    window.localStorage.setItem('pendingEmpData', JSON.stringify(foundEmployee));
                    
                    const maskedEmail = maskEmail(foundEmployee.email);
                    const textClass = targetType === 'admin' ? 'text-brand-orange' : 'text-brand-blue';
                    document.getElementById(messageElementId).innerHTML = `Login link sent securely to <br><span class="font-bold ${textClass}">${maskedEmail}</span>`;
                    
                    document.getElementById(step1Id).classList.add('hidden');
                    document.getElementById(step2Id).classList.remove('hidden');

                } else {
                    showToast('ID not found. Check with your administrator.', 'error');
                }
                
            } catch (error) {
                console.error(error);
                if (error.code === 'auth/quota-exceeded' || error.code === 'auth/too-many-requests' || error.message.toLowerCase().includes('quota')) {
                    showToast('Email Quota Reached! Please use the Fallback Login below.', 'info', 5000);
                } else {
                    showToast('Failed to send login link. Error: ' + error.message, 'error');
                }
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        };

        // Bind Link Request Buttons
        document.getElementById('getAdminLinkBtn').addEventListener('click', () => {
            processMagicLinkRequest('adminId', 'getAdminLinkBtn', 'admin', 'adminLinkMessage', 'adminStep1', 'adminLinkStep2');
        });
        document.getElementById('backToAdminIdBtn').addEventListener('click', () => {
            document.getElementById('adminLinkStep2').classList.add('hidden');
            document.getElementById('adminStep1').classList.remove('hidden');
        });

        document.getElementById('getOtpBtn').addEventListener('click', () => {
            processMagicLinkRequest('empId', 'getOtpBtn', 'employee', 'magicLinkMessage', 'otpStep1', 'magicLinkStep2');
        });
        document.getElementById('backToIdBtn').addEventListener('click', () => {
            document.getElementById('magicLinkStep2').classList.add('hidden');
            document.getElementById('otpStep1').classList.remove('hidden');
        });

        // Handle incoming link click
        const handleIncomingMagicLink = async () => {
            if (isSignInWithEmailLink(auth, window.location.href)) {
                const urlParams = new URLSearchParams(window.location.search);
                const target = urlParams.get('target') || 'employee';

                let email = window.localStorage.getItem('emailForSignIn');
                if (!email) {
                    email = window.prompt('Please confirm your email address to log in:');
                }

                if (email) {
                    try {
                        await signInWithEmailLink(auth, email, window.location.href);
                        window.localStorage.removeItem('emailForSignIn');
                        
                        let activeUser = JSON.parse(window.localStorage.getItem('pendingEmpData'));
                        
                        if (!activeUser) {
                            const employeesRef = collection(db, 'artifacts', appId, 'public', 'data', 'employees');
                            const snapshot = await getDocs(employeesRef);
                            snapshot.forEach(docSnap => {
                                if (docSnap.data().email === email) {
                                    activeUser = { id: docSnap.id, ...docSnap.data() };
                                }
                            });
                        }

                        if (activeUser) {
                            if (target === 'admin') {
                                if (activeUser.role === 'Admin') {
                                    window.location.href = 'admin.html';
                                } else {
                                    showToast("Access Denied: You do not have Administrator privileges.", "error", 6000);
                                    window.history.replaceState({}, document.title, window.location.pathname);
                                }
                            } else {
                                sessionStorage.setItem('stratedge_active_user', JSON.stringify(activeUser));
                                window.location.href = 'timesheet.html';
                            }
                        } else {
                            showToast("Profile not found.", "error");
                        }
                    } catch (error) {
                        console.error(error);
                        showToast("Link expired or invalid. Please try again or use fallback login.", "error", 6000);
                    }
                }
            } else {
                initAuth();
            }
        };

        const initAuth = async () => {
            try {
                await signInAnonymously(auth);
            } catch (error) {
                console.error("Auth error", error);
            }
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
        });

        handleIncomingMagicLink();
    </script>
</body>
</html>
